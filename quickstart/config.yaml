db:
  user: "root"
  password: "password"
  host: "mysql"
  port: 3306
  database: "mkauth"
  charset: "utf8mb4"

redis:
  addr: "redis:6379"
  password: ""
  db: 0

secrets:
  # Optional. For local quickstart you can keep this empty.
  encryption_key_env: ""
  decryption_key_envs: []

storage:
  provider: "minio"
  endpoint: "minio:9000"
  region: "zhuhai-1"
  accessKeyID: "T64JKDV276dJp10"
  secretAccessKey: "1JzdCtZqgiys22q"
  stsAccessKeyID: "user"
  stsSecretAccessKey: "LRfETL5HGUGAGv9"
  attatchBucket: "attatch"

storage_public_url:
  attatch: "http://127.0.0.1:9002/attatch"

oidc:
  enabled: true
  issuer: ""
  key_id: "mkauth-quickstart"
  private_key_file: "/app/config/oidc-private-key.pem"
  code_ttl_seconds: 300
  access_token_ttl_seconds: 900
  id_token_ttl_seconds: 900
  clients:
    - name: "Demo SPA"
      client_id: "demo-spa"
      public: true
      require_pkce: true
      redirect_uris:
        - "http://127.0.0.1:3000/"
        - "http://localhost:3000/"
      scopes:
        - "openid"
        - "profile"
        - "email"
    - name: "Demo Backend"
      client_id: "demo-backend"
      client_secret: "demo-backend-secret"
      public: false
      require_pkce: true
      redirect_uris:
        - "http://127.0.0.1:8082/auth/callback"
        - "http://localhost:8082/auth/callback"
      scopes:
        - "openid"
        - "profile"
        - "email"
      # Example organization policy for B2B apps:
      # require_organization: true
      # allowed_organizations:
      #   - "acme"
      # required_org_roles:
      #   - "admin"
      # required_org_roles_all:
      #   - "security"
      # required_org_groups:
      #   - "Engineering Team"
      # required_org_groups_all:
      #   - "Employees"
      # scope_policies:
      #   email:
      #     required_org_roles_all:
      #       - "security"

auth:
  enabled_providers:
    - "account"

auth_admin:
  enabled: false
  security_audit_export_job_retention_days: 7
  security_audit_export_job_auto_cleanup: true
