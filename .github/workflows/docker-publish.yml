name: Docker

on:
  workflow_dispatch:
  pull_request:
    paths:
      - Dockerfile
      - .dockerignore
      - .github/workflows/docker-publish.yml
      - server/**
      - web/**
      - admin-web/**
      - .nvmrc
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

env:
  GHCR_REGISTRY: ghcr.io
  DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE }}
  DOCKERHUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-check:
    name: Docker Build Check
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: false
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish:
    name: Docker Publish
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare image names
        id: prep
        env:
          REPOSITORY_NAME: ${{ github.event.repository.name }}
        run: |
          ghcr_image="${GHCR_REGISTRY}/${GITHUB_REPOSITORY,,}"
          echo "ghcr_image=${ghcr_image}" >> "$GITHUB_OUTPUT"

          {
            echo 'images<<EOF'
            echo "${ghcr_image}"
            if [ -n "${DOCKERHUB_NAMESPACE}" ] && [ -n "${DOCKERHUB_USERNAME}" ] && [ -n "${DOCKERHUB_TOKEN}" ]; then
              dockerhub_image="${DOCKERHUB_NAMESPACE,,}/${REPOSITORY_NAME,,}"
              echo "dockerhub_enabled=true" >> "$GITHUB_OUTPUT"
              echo "dockerhub_image=${dockerhub_image}" >> "$GITHUB_OUTPUT"
              echo "${dockerhub_image}"
            else
              echo "dockerhub_enabled=false" >> "$GITHUB_OUTPUT"
            fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: ${{ steps.prep.outputs.dockerhub_enabled == 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Docker Hub publish is disabled
        if: ${{ steps.prep.outputs.dockerhub_enabled != 'true' }}
        run: |
          echo "Skipping Docker Hub publish."
          echo "Set DOCKERHUB_NAMESPACE as an Actions variable, and DOCKER_HUB_USERNAME / DOCKER_HUB_TOKEN as Actions secrets to enable it."

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.prep.outputs.images }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
