id: http-claims-action
name: HTTP Claims Action
version: 0.1.0
type: flow_action
entry: http_action
description: Example manifest for an HTTP action that can enrich token and userinfo claims.
permissions:
  - hook:pre_register
  - hook:post_register
  - hook:pre_authenticate
  - hook:before_token_issue
  - hook:before_userinfo
  - hook:post_authenticate
  - hook:post_logout
  - network:http_action
config_schema:
  - key: url
    label: HTTP Action URL
    type: url
    required: true
    default: "https://actions.example.com/mkauth"
    description: Endpoint that receives MKAuth hook payloads.
  - key: secret_env
    label: Secret Environment Variable
    type: string
    default: "MKAUTH_HTTP_CLAIMS_SECRET"
    description: Environment variable used as the Bearer token secret.
  - key: timeout_ms
    label: Timeout (ms)
    type: integer
    default: "3000"
  - key: fail_open
    label: Fail Open
    type: boolean
    default: "false"
events:
  - pre_register
  - post_register
  - pre_authenticate
  - before_token_issue
  - before_userinfo
  - post_authenticate
  - post_logout
http_action:
  url: "https://actions.example.com/mkauth"
  secret_env: "MKAUTH_HTTP_CLAIMS_SECRET"
  timeout_ms: 3000
  fail_open: false
