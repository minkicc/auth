version: "1"
plugins:
  - id: "http-claims-action"
    name: "HTTP Claims Action"
    version: "0.1.0"
    type: "flow_action"
    description: "Example flow action plugin served from a remote catalog."
    permissions:
      - "hook:pre_register"
      - "hook:post_register"
      - "hook:pre_authenticate"
      - "hook:before_token_issue"
      - "hook:before_userinfo"
      - "hook:post_authenticate"
      - "hook:post_logout"
      - "network:http_action"
    download_url: "https://plugins.example.com/mkauth/http-claims-action.zip"
    homepage: "https://example.com/docs/mkauth/http-claims-action"
    package_sha256: "REPLACE_WITH_REAL_ZIP_SHA256"
    signature_required: true
  - id: "static-claim-mapper"
    name: "Static Claim Mapper"
    version: "0.1.0"
    type: "claim_mapper"
    description: "Example claim mapper plugin for static and context-derived custom claims."
    permissions:
      - "hook:before_token_issue"
      - "hook:before_userinfo"
    download_url: "https://plugins.example.com/mkauth/static-claim-mapper.zip"
    homepage: "https://example.com/docs/mkauth/static-claim-mapper"
    package_sha256: "REPLACE_WITH_REAL_ZIP_SHA256"
    signature_required: true
  - id: "audit-webhook-sink"
    name: "Audit Webhook Sink"
    version: "0.1.0"
    type: "audit_sink"
    description: "Example audit sink plugin that forwards admin security audit events to an HTTPS webhook."
    permissions:
      - "audit:security"
      - "network:audit_sink"
    download_url: "https://plugins.example.com/mkauth/audit-webhook-sink.zip"
    homepage: "https://example.com/docs/mkauth/audit-webhook-sink"
    package_sha256: "REPLACE_WITH_REAL_ZIP_SHA256"
    signature_required: true
